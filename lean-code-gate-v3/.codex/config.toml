[features]
codex_hooks = true

[[hooks.SessionStart]]
matcher = "startup|resume|clear"
[[hooks.SessionStart.hooks]]
type = "command"
command = 'PYTHONDONTWRITEBYTECODE=1 python3 -B -S "$(git rev-parse --show-toplevel 2>/dev/null || pwd)/.agent/lean/lean_code_gate.py" session-start'
timeout = 10
statusMessage = "Loading Lean Code Gate v3"

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'PYTHONDONTWRITEBYTECODE=1 python3 -B -S "$(git rev-parse --show-toplevel 2>/dev/null || pwd)/.agent/lean/lean_code_gate.py" user-prompt'
timeout = 10
statusMessage = "Injecting Lean Code Gate v3"

[[hooks.PreToolUse]]
matcher = "^(Bash|apply_patch|ApplyPatch|Edit|Write|MultiEdit|NotebookEdit)$"
[[hooks.PreToolUse.hooks]]
type = "command"
command = 'PYTHONDONTWRITEBYTECODE=1 python3 -B -S "$(git rev-parse --show-toplevel 2>/dev/null || pwd)/.agent/lean/lean_code_gate.py" pretool'
timeout = 10
statusMessage = "Checking Lean Change Contract"

[[hooks.PermissionRequest]]
matcher = "^(Bash|apply_patch|ApplyPatch|Edit|Write|MultiEdit|NotebookEdit)$"
[[hooks.PermissionRequest.hooks]]
type = "command"
command = 'PYTHONDONTWRITEBYTECODE=1 python3 -B -S "$(git rev-parse --show-toplevel 2>/dev/null || pwd)/.agent/lean/lean_code_gate.py" permission-request'
timeout = 10
statusMessage = "Checking mutation permission"

[[hooks.PostToolUse]]
matcher = "^(Bash|apply_patch|ApplyPatch|Edit|Write|MultiEdit|NotebookEdit)$"
[[hooks.PostToolUse.hooks]]
type = "command"
command = 'PYTHONDONTWRITEBYTECODE=1 python3 -B -S "$(git rev-parse --show-toplevel 2>/dev/null || pwd)/.agent/lean/lean_code_gate.py" posttool'
timeout = 10
statusMessage = "Recording Lean Code Gate result"

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = 'PYTHONDONTWRITEBYTECODE=1 python3 -B -S "$(git rev-parse --show-toplevel 2>/dev/null || pwd)/.agent/lean/lean_code_gate.py" stop'
timeout = 20
statusMessage = "Running Lean final check"
